<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/styles.css" />
    <title>homework7</title>
  </head>
  <body>
    <section>
      <div class="card">
        <div class="main-image">
          <div class="top-part">
            <div class="popular">
              <p>Popular</p>
            </div>
            <div class="favorite">
              <img src="./images/heart.png" alt="favorite icon" />
            </div>
          </div>

          <div class="bottom-part">
            <div class="main-text">
              <h2 class="title">Vereda do Pico do Arieiro</h2>
              <div class="location">
                <img src="./images/Union.png" alt="icon" />
                <p>Santana, Portugal</p>
              </div>
            </div>
            <div class="start-button">
              <p>Start Route</p>
              <img src="./images/Vector (1).png" alt="button logo" />
            </div>
          </div>
        </div>

        <div class="second-part">
          <div class="left-side">
            <div class="text-part">
              <div class="distance">
                <h3>12.4km</h3>
                <p class="meter">Distance</p>
              </div>

              <div class="elevation">
                <h3>840m</h3>
                <p class="meter">Elevantion</p>
              </div>

              <div class="duration">
                <h3>8h 15m</h3>
                <p class="meter">Duration</p>
              </div>
            </div>

            <div class="rating">
              <div class="main">
                <div class="control">
                  <div class="level">
                    <div class="gray-button"></div>
                    <div class="pink-button"></div>
                  </div>
                  <div class="level-text">Hard Level</div>
                </div>

                <div class="star">
                  <div class="points">
                    <p>4.2</p>
                    <img src="./images/Star.png" alt="star" />
                  </div>
                  <p class="review-text">Rating</p>
                </div>
              </div>
            </div>
          </div>

          <div class="right-side">
            <div class="last-part"></div>
          </div>
        </div>
