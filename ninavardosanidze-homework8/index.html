<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/styles.css" />
    <title>homework8</title>
  </head>
  <body>
    <section>
      <div class="main">
        <div class="card">
          <div class="header">
            <h3>Premium</h3>
            <h3>$199<span class="month">/month</span></h3>
          </div>
          <p class="faster">Faster Instagram Growth</p>

          <form action="#" class="sign-in">
            <input type="email" placeholder="Email" />
            <input type="text" placeholder="Cardholder Name" />

            <div class="card-info">
              <input type="number" placeholder="Card Number" />
              <img src="./images/card.png" alt="cardicon" class="icon" />
            </div>

            <div class="bank-card">
              <input type="number" placeholder="Date" class="date" />
              <input type="number" placeholder="CVV" class="cvv" />
            </div>

            <div class="address">
              <select name="country" id="Country" class="country">
                <option value="country">Country</option>
              </select>
              <input type="number" placeholder="Zip" />
            </div>

            <input type="text" placeholder="Discount Code" />
          </form>

          <label class="footer">
            <div class="box">
              <input type="checkbox" id="accept" />
              <div class="checkmark">
                <img src="./images/sign.png" alt="icon" class="box-sign" />
              </div>
            </div>
            <p>
              I accept <a href="#">The Terms of Service</a> and
              <a href="#">Privacy Policy</a>
            </p>
          </label>
          <button class="button">
            Get started | $199 <span class="sale">$249</span>
          </button>
          <a href="#" class="code">Have a coupon?</a>
        </div>
      </div>
    </section>
  </body>
</html>
